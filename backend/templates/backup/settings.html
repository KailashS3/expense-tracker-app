<!DOCTYPE html>
<html>

<head>

    <title>Notification Settings</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h2>Notification Settings</h2>

    <form method="POST">

        <label>
            <input type="checkbox"
                   name="scheduler_enabled"
                   {% if setting.scheduler_enabled %}
                   checked
                   {% endif %}>
            Enable Scheduler
        </label>

        <br><br>

        <label>
            <input type="checkbox"
                   name="daily_enabled"
                   {% if setting.daily_enabled %}
                   checked
                   {% endif %}>
            Daily Notification
        </label>

        <br><br>

        <label>
            <input type="checkbox"
                   name="weekly_enabled"
                   {% if setting.weekly_enabled %}
                   checked
                   {% endif %}>
            Weekly Notification
        </label>

        <br><br>

        <label>
            <input type="checkbox"
                   name="monthly_enabled"
                   {% if setting.monthly_enabled %}
                   checked
                   {% endif %}>
            Monthly Notification
        </label>

        <br><br>

        <label>
            Budget Limit
        </label>

        <input type="number"
               step="0.01"
               name="budget_limit"
               value="{{ setting.budget_limit }}">

        <br><br>

        <label>
            Notify Time
        </label>

        <input type="time"
               name="notify_time"
               value="{{ setting.notify_time }}">

        <br><br>

        <label>
            Notification Email
        </label>

        <input type="email"
               name="notification_email"
               value="{{ setting.notification_email }}">

        <br><br>

        <button type="submit">
            Save Settings
        </button>

    </form>

    <br>

    <a href="/dashboard">
        Back To Dashboard
    </a>

</div>

</body>
</html>
