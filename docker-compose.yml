services:

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend

    networks:
      - expense-tracker-network


  backend:
    build: ./backend

    container_name: expense-tracker-app-backend

    ports:
      - "5000:5000"

    environment:
      MYSQL_USER: expenseuser
      MYSQL_PASSWORD: expensepass
      MYSQL_HOST: mysql
      MYSQL_DB: expensesdb

    depends_on:
      mysql:
        condition: service_healthy

    restart: always

    networks:
      - expense-tracker-network

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  mysql:
    image: mysql:8.0

    container_name: mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: expensesdb
      MYSQL_USER: expenseuser
      MYSQL_PASSWORD: expensepass

    ports:
      - "3306:3306"

    networks:
      - expense-tracker-network

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s


networks:
  expense-tracker-network:
    driver: bridge


volumes:
  mysql_data:
